<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - EcoShine Car Wash cc | Authentication</title>
  <meta name="description" content="Sign in or create an account to book premium mobile car wash services.">
  <link rel="icon" type="image/png" href="assets/images/icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            emerald: { 500: '#6dbb6d', 600: '#5da85d', 400: '#8cc88c' },
            teal: { 700: '#1a5f7a', 600: '#1e6b8a', 500: '#23799c' },
            slate: { 950: '#07090f', 900: '#0a0f1a', 850: '#0d1320' }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/custom-animations.css">
  <link rel="stylesheet" href="css/tailwind-base.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(135deg, rgba(7, 9, 15, 0.76), rgba(7, 11, 19, 0.88)),
        url('assets/images/login image.jpg');
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      position: relative;
      overflow: hidden;
    }
    .auth-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(109, 187, 109, 0.22), transparent 30%),
        radial-gradient(circle at bottom right, rgba(35, 121, 156, 0.18), transparent 32%);
      pointer-events: none;
    }
    .auth-shell {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 1rem;
    }
    .auth-card {
      width: 100%;
      max-width: 23rem;
      background: rgba(8, 12, 20, 0.78);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 20px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
    }
    .auth-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 9px 12px;
      color: #ffffff;
      width: 100%;
      transition: all 0.3s ease;
      font-size: 14px;
    }
    .auth-input:focus {
      outline: none;
      border-color: rgba(109, 187, 109, 0.5);
      box-shadow: 0 0 0 3px rgba(109, 187, 109, 0.1);
    }
    .auth-input::placeholder {
      color: #6b7280;
    }
    .auth-btn {
      background: linear-gradient(135deg, #6dbb6d, #1a5f7a);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 9px 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
    }
    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(109, 187, 109, 0.3);
    }
    .auth-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .auth-link {
      color: #6dbb6d;
      cursor: pointer;
      transition: color 0.2s ease;
    }
    .auth-link:hover {
      color: #8cc88c;
    }
    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      display: none;
    }
    .success-message {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      display: none;
    }
    .tab-active {
      background: rgba(109, 187, 109, 0.1);
      border-color: rgba(109, 187, 109, 0.3);
      color: #6dbb6d;
    }
    @media (max-width: 640px) {
      .auth-shell {
        padding: 0.75rem;
      }
      .auth-card {
        max-width: 19.5rem;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body class="bg-slate-950 text-gray-100 min-h-screen">

  <!-- AUTH PAGE -->
  <div class="auth-container">
    <div class="auth-shell">
      <div class="auth-card p-5 sm:p-6">
        <div class="text-center mb-5">
          <img src="assets/images/icon.png" alt="EcoShine" class="h-10 w-10 mx-auto mb-2.5 object-contain">
          <h1 class="text-lg font-bold text-white mb-1">Welcome to EcoShine</h1>
          <p class="text-gray-400 text-[11px] leading-5">Sign in to book your premium mobile wash</p>
        </div>

        <div id="auth-error" class="error-message"></div>
        <div id="auth-success" class="success-message"></div>

        <div class="flex gap-2 mb-5">
          <button id="tab-signin" class="flex-1 py-2.5 rounded-xl border border-white/10 text-sm font-medium transition-all tab-active" onclick="showTab('signin')">
            Sign In
          </button>
          <button id="tab-signup" class="flex-1 py-2.5 rounded-xl border border-white/10 text-gray-400 text-sm font-medium transition-all hover:text-white hover:border-emerald-500/30" onclick="showTab('signup')">
            Sign Up
          </button>
        </div>

        <form id="signin-form" class="space-y-4">
          <div>
            <label class="block text-white text-sm font-medium mb-1.5">Email</label>
            <input type="email" id="signin-email" required placeholder="you@example.com" class="auth-input">
          </div>
          <div>
            <label class="block text-white text-sm font-medium mb-1.5">Password</label>
            <input type="password" id="signin-password" required placeholder="Password" class="auth-input">
          </div>
          <div class="flex items-center justify-between text-sm gap-3">
            <label class="flex items-center gap-2 text-gray-400">
              <input type="checkbox" class="rounded border-gray-600 bg-slate-800 text-emerald-500 focus:ring-emerald-500">
              Remember me
            </label>
            <a href="#" onclick="showForgotPassword()" class="auth-link text-sm whitespace-nowrap">Forgot password?</a>
          </div>
          <button type="submit" class="auth-btn">
            <span class="flex items-center justify-center gap-2">
              <i class="fas fa-sign-in-alt"></i>
              Sign In
            </span>
          </button>
        </form>

        <form id="signup-form" class="space-y-4 hidden">
          <div>
            <label class="block text-white text-sm font-medium mb-1.5">Full Name</label>
            <input type="text" id="signup-name" required placeholder="Valued Customer" class="auth-input text-sm" style="padding:9px 12px">
          </div>
          <div>
            <label class="block text-white text-sm font-medium mb-1.5">Email</label>
            <input type="email" id="signup-email" required placeholder="you@example.com" class="auth-input">
          </div>
          <div>
            <label class="block text-white text-sm font-medium mb-1.5">Password</label>
            <input type="password" id="signup-password" required placeholder="Min. 6 characters" minlength="6" class="auth-input">
          </div>
          <div>
            <label class="block text-white text-sm font-medium mb-1.5">Confirm Password</label>
            <input type="password" id="signup-confirm" required placeholder="Repeat password" minlength="6" class="auth-input">
          </div>
          <button type="submit" class="auth-btn">
            <span class="flex items-center justify-center gap-2">
              <i class="fas fa-user-plus"></i>
              Create Account
            </span>
          </button>
        </form>

        <form id="forgot-form" class="space-y-4 hidden">
          <div class="text-center mb-3">
            <i class="fas fa-key text-emerald-400 text-2xl mb-2"></i>
            <p class="text-gray-400 text-sm">Enter your email and we'll send you a reset link.</p>
          </div>
          <div>
            <label class="block text-white text-sm font-medium mb-1.5">Email</label>
            <input type="email" id="forgot-email" required placeholder="you@example.com" class="auth-input">
          </div>
          <button type="submit" class="auth-btn">
            <span class="flex items-center justify-center gap-2">
              <i class="fas fa-paper-plane"></i>
              Send Reset Link
            </span>
          </button>
          <button type="button" onclick="showTab('signin')" class="w-full text-center text-gray-400 hover:text-white text-sm transition-colors">
            Back to Sign In
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await window.firebaseService.initializeSystem();
      checkCurrentUser();

      const initialTab = window.location.hash === '#signup' ? 'signup' : 'signin';
      showTab(initialTab);
    });

    function showTab(tab) {
      const signinForm = document.getElementById('signin-form');
      const signupForm = document.getElementById('signup-form');
      const forgotForm = document.getElementById('forgot-form');
      const tabSignin = document.getElementById('tab-signin');
      const tabSignup = document.getElementById('tab-signup');
      const errorEl = document.getElementById('auth-error');
      const successEl = document.getElementById('auth-success');

      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      if (tab === 'signin') {
        signinForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
        forgotForm.classList.add('hidden');
        tabSignin.classList.add('tab-active');
        tabSignin.classList.remove('text-gray-400');
        tabSignup.classList.remove('tab-active');
        tabSignup.classList.add('text-gray-400');
      } else if (tab === 'signup') {
        signinForm.classList.add('hidden');
        signupForm.classList.remove('hidden');
        forgotForm.classList.add('hidden');
        tabSignup.classList.add('tab-active');
        tabSignup.classList.remove('text-gray-400');
        tabSignin.classList.remove('tab-active');
        tabSignin.classList.add('text-gray-400');
      } else if (tab === 'forgot') {
        signinForm.classList.add('hidden');
        signupForm.classList.add('hidden');
        forgotForm.classList.remove('hidden');
        tabSignin.classList.remove('tab-active');
        tabSignin.classList.add('text-gray-400');
        tabSignup.classList.remove('tab-active');
        tabSignup.classList.add('text-gray-400');
      }
    }

    function showForgotPassword() {
      showTab('forgot');
    }

    function showError(message) {
      const errorEl = document.getElementById('auth-error');
      errorEl.textContent = message;
      errorEl.style.display = 'block';
    }

    function showSuccess(message) {
      const successEl = document.getElementById('auth-success');
      successEl.textContent = message;
      successEl.style.display = 'block';
    }

    async function checkCurrentUser() {
      const result = await window.authService.getCurrentUser();
      if (result.success && result.user) {
        if (result.role === 'admin') {
          window.location.href = 'admin.html';
        } else if (result.role === 'worker') {
          window.location.href = 'worker.html';
        } else {
          window.location.href = 'users.html';
        }
      }
    }

    document.getElementById('signin-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('signin-email').value;
      const password = document.getElementById('signin-password').value;
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

      const result = await window.authService.loginUser(email, password);

      if (result.success) {
        showSuccess('Login successful! Redirecting...');
        if (result.role === 'admin') {
          window.location.href = 'admin.html';
        } else if (result.role === 'worker') {
          window.location.href = 'worker.html';
        } else {
          window.location.href = 'users.html';
        }
      } else {
        showError(result.error || 'Login failed. Please check your credentials.');
        btn.disabled = false;
        btn.innerHTML = '<span class="flex items-center justify-center gap-2"><i class="fas fa-sign-in-alt"></i> Sign In</span>';
      }
    });

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;
      const btn = e.target.querySelector('button');

      if (password !== confirm) {
        showError('Passwords do not match.');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';

      const result = await window.authService.registerUser(email, password, 'client', {
        name: name,
        status: 'online'
      });

      if (result.success) {
        showSuccess('Account created! Redirecting...');
        window.location.href = 'users.html';
      } else {
        showError(result.error || 'Registration failed. Please try again.');
        btn.disabled = false;
        btn.innerHTML = '<span class="flex items-center justify-center gap-2"><i class="fas fa-user-plus"></i> Create Account</span>';
      }
    });

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgot-email').value;
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

      const result = await window.firebaseService.sendPasswordResetEmail(email);

      if (result.success) {
        showSuccess(result.message);
        btn.disabled = false;
        btn.innerHTML = '<span class="flex items-center justify-center gap-2"><i class="fas fa-paper-plane"></i> Send Reset Link</span>';
        setTimeout(() => showTab('signin'), 3000);
      } else {
        showError(result.error || 'Failed to send reset email.');
        btn.disabled = false;
        btn.innerHTML = '<span class="flex items-center justify-center gap-2"><i class="fas fa-paper-plane"></i> Send Reset Link</span>';
      }
    });
  </script>
</body>
</html>
